version: '3.8'

services:
  # 1. 데이터베이스 서비스 (PostgreSQL)
  db:
    image: postgres:15-alpine # 가벼운 알파인 이미지 사용
    container_name: todo-postgres
    restart: always # 컨테이너가 꺼지면 자동으로 재시작
    environment:
      POSTGRES_DB: tododb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432" # 호스트 OS에서 DB 툴로 접속 가능하게 설정
    volumes:
      - postgres_data:/var/lib/postgresql/data # 컨테이너 삭제 후에도 데이터 유지
    networks:
      - todo-network

  # 2. 백엔드 서비스 (Spring Boot 4.0.3)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: todo-backend
    depends_on:
      - db # DB가 먼저 실행되어야 함
    environment:
      # 백엔드가 DB 서비스('db')를 찾을 수 있도록 URL 설정
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/tododb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: password
      # 배치가 자동으로 도는 것을 방지 (스케줄러가 있으니까요!)
      SPRING_BATCH_JOB_ENABLED: "false"
      SPRING_BATCH_JDBC_INITIALIZE_SCHEMA: "always"
    ports:
      - "8080:8080"
    networks:
      - todo-network

  # 3. 프론트엔드 서비스 (React + Nginx)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: todo-frontend
    depends_on:
      - backend # 백엔드가 먼저 실행되어야 프록시 가능
    ports:
      - "80:80" # 웹 브라우저에서 'http://localhost'로 접속 가능
    networks:
      - todo-network

# 공용 네트워크 정의
networks:
  todo-network:
    driver: bridge

# 데이터 볼륨 정의
volumes:
  postgres_data: