name: Todo Project CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # 백엔드 빌드 및 테스트
  backend-build:
    # 빌드하게 될 가상환경 OS
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: tododb # application-local.properties 의 이름을 맞춰줌
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    # 명령어가 실행될 기본 경로
    defaults:
      run:
        working-directory: ./backend

    steps:
      # 저장소 코드를 가상환경으로 가져옴
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin" # 오픈소스 JDK 배포판
          cache: gradle # 의존성파일을 캐싱하여 다음 빌드 속도를 높임

        # 리눅스 환경에서 Gradle 실행파일에 실행 권한 부여
      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

        # 빌드 및 테스트, 테스트 실패 시 빌드 중단
      - name: Build with Gradle
        run: ./gradlew build
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/tododb
          SPRING_DATASOUECE_USERNAME: postgres
          SPRING_DATASOURCE_PASSWORD: password
          SPRING_BATCH_JDBC_INITIALIZE_SCHEMA: always # 테스트 시 배치 작업이 실행되지 않도록 설정

  # 프론트엔드 빌드
  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm" # node_modules 캐싱하여 설치시간 단축
          cache-dependency-path: frontend/package-lock.json

        # 의존성 패키지 설치, npm install 보다 npm ci 이 깔끔하고 빌드환경에 적합
      - name: Install dependencies
        run: npm ci

        # 리액트 앱 빌드
      - name: Build React App
        run: npm run build

  push-images:
    runs-on: ubuntu-latest
    # 의존성 설정 앞선 두 빌드가 성공해야 작업 시작
    needs: [backend-build, frontend-build]

    # main 브랜치에 push 되었을 때만 이미지 업로드
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 백엔드 이미지 빌드 및 푸시
      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/todo-backend:latest

      # 프론트엔드 이미지 빌드 및 푸시
      - name: Build and push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/todo-frontend:latest
