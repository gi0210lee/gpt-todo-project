name: Todo Project CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # 백엔드 빌드 및 테스트
  backend-build:
    # 빌드하게 될 가상환경 OS
    runs-on: ubuntu-latest

    # 명령어가 실행될 기본 경로
    defaults:
      run:
        working-directory: ./backend

    steps:
      # 저장소 코드를 가상환경으로 가져옴
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin" # 오픈소스 JDK 배포판
          cache: gradle # 의존성파일을 캐싱하여 다음 빌드 속도를 높임

        # 리눅스 환경에서 Gradle 실행파일에 실행 권한 부여
      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

        # 빌드 및 테스트, 테스트 실패 시 빌드 중단
      - name: Build with Gradle
        run: ./gradlew build

  # 프론트엔드 빌드
  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm" # node_modules 캐싱하여 설치시간 단축
          cache-dependency-path: frontend/package-lock.json

        # 의존성 패키지 설치, npm install 보다 npm ci 이 깔끔하고 빌드환경에 적합
      - name: Install dependencies
        run: npm ci

        # 리액트 앱 빌드
      - name: Build React App
        run: npm run build
